services:
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      AUTH_TOKEN: dev-token
      CODEX_RUNTIME: app-server
      CODEX_ARGS: app-server,--listen,stdio://
      PROJECT_ROOTS: /workspace
      ENABLE_PUSH: "false"
    volumes:
      - ../:/workspace:ro
    ports:
      - "8787:8787"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

name: Build And Release Mobile Artifacts

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
      - "*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build_android:
    name: Compile And Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Compile backend and contracts
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-mobile-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build_ios:
    name: Build Unsigned iOS App
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build unsigned iOS app bundle
        working-directory: apps/mobile
        run: flutter build ios --release --no-codesign

      - name: Package iOS app for release
        working-directory: apps/mobile/build/ios/iphoneos
        run: |
          ditto -c -k --sequesterRsrc --keepParent Runner.app codex-mobile-${{ github.ref_name }}-ios-runner-unsigned.zip

      - name: Upload iOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-mobile-release-ios
          path: apps/mobile/build/ios/iphoneos/codex-mobile-${{ github.ref_name }}-ios-runner-unsigned.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    needs:
      - build_android
      - build_ios
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-mobile-release-apk
          path: dist

      - name: Rename artifact with tag
        run: mv dist/app-release.apk dist/codex-mobile-${{ github.ref_name }}.apk

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-mobile-release-ios
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codex-mobile-${{ github.ref_name }}.apk
            dist/codex-mobile-${{ github.ref_name }}-ios-runner-unsigned.zip
          generate_release_notes: true
